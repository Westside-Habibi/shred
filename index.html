<title>HB Shred</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --surface: rgba(255,255,255,0.055);
  --surface2: rgba(255,255,255,0.032);
  --surface3: rgba(255,255,255,0.018);
  --border: rgba(255,255,255,0.1);
  --border2: rgba(255,255,255,0.06);
  --text: #ffffff;
  --text2: rgba(255,255,255,0.55);
  --text3: rgba(255,255,255,0.3);
  --blue: #0A84FF;
  --blue2: rgba(10,132,255,0.18);
  --cyan: #5AC8FA;
  --purple: #BF5AF2;
  --green: #30D158;
  --green2: rgba(48,209,88,0.15);
  --red: #FF453A;
  --red2: rgba(255,69,58,0.15);
  --yellow: #FFD60A;
  --r1: 22px;
  --r2: 16px;
  --r3: 12px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  font-family: Inter, -apple-system, sans-serif;
  background: #000;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: calc(env(safe-area-inset-bottom) + 100px);
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(10,132,255,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 10%, rgba(191,90,242,0.15) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, rgba(90,200,250,0.08) 0%, transparent 50%);
  pointer-events: none;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(10,132,255,0.06) 0%, transparent 60%);
  animation: pulse 8s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes pulse { from{opacity:0.5} to{opacity:1} }
.z1 { position: relative; z-index: 1; }

/* SCROLLBAR */
::-webkit-scrollbar { display:none; }

/* GLASS MIXIN */
.glass {
  background: var(--surface);
  border: 1px solid var(--border);
  backdrop-filter: blur(40px) saturate(200%) brightness(1.1);
  -webkit-backdrop-filter: blur(40px) saturate(200%) brightness(1.1);
}
.glass-dark {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border2);
  backdrop-filter: blur(60px) saturate(180%);
  -webkit-backdrop-filter: blur(60px) saturate(180%);
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
  background: rgba(0,0,0,0.55);
  border-bottom: 1px solid var(--border2);
  backdrop-filter: blur(60px) saturate(180%);
  -webkit-backdrop-filter: blur(60px) saturate(180%);
}
.header-row { display:flex; justify-content:space-between; align-items:center; }
.header-left h1 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1.5px;
  background: linear-gradient(135deg, #fff 60%, rgba(255,255,255,0.5));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-left p { font-size:13px; color:var(--text2); margin-top:2px; font-weight:500; }
.saved-pill {
  display:flex; align-items:center; gap:6px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(48,209,88,0.12);
  border: 1px solid rgba(48,209,88,0.25);
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
}
.saved-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); }

/* CONTENT */
.content { padding: 16px 16px 0; position:relative; z-index:1; }

/* WEEK SCROLL */
.week-scroll { display:flex; gap:8px; overflow-x:auto; margin-bottom:14px; padding-bottom:2px; }
.wchip {
  flex-shrink:0;
  padding: 8px 16px;
  border-radius: 999px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  letter-spacing: -0.2px;
}
.wchip.on {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
  box-shadow: 0 0 20px rgba(10,132,255,0.4);
}

/* HERO */
.hero {
  border-radius: var(--r1);
  padding: 22px;
  margin-bottom: 12px;
  overflow: hidden;
  position: relative;
}
.hero::before {
  content:"";
  position:absolute;
  top:-40px; right:-40px;
  width:180px; height:180px;
  border-radius:50%;
  background: var(--hero-glow, rgba(10,132,255,0.3));
  filter: blur(50px);
  pointer-events:none;
}
.hero-tag { font-size:11px; font-weight:700; letter-spacing:2px; color:var(--cyan); text-transform:uppercase; }
.hero-row { display:flex; justify-content:space-between; align-items:flex-start; margin-top:8px; }
.hero-title { font-size:28px; font-weight:800; letter-spacing:-1.5px; line-height:1.1; }
.hero-sub { font-size:13px; color:var(--text2); margin-top:6px; line-height:1.5; }
.hero-orb {
  width:56px; height:56px; border-radius:50%; flex-shrink:0;
  background: var(--hero-orb, linear-gradient(135deg,#0A84FF,#BF5AF2));
  box-shadow: 0 0 30px var(--hero-shadow, rgba(10,132,255,0.6));
}
.prog-row { display:flex; align-items:center; gap:10px; margin-top:16px; }
.prog-track { flex:1; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--blue),var(--purple)); transition:width 0.5s; }
.prog-pct { font-size:12px; font-weight:700; color:var(--text2); min-width:28px; text-align:right; }

/* DAY TABS */
.days { display:flex; gap:7px; margin-bottom:12px; }
.day {
  flex:1;
  padding: 12px 6px;
  border-radius: var(--r2);
  background: var(--surface2);
  border: 1px solid var(--border2);
  text-align:center;
  cursor:pointer;
  transition: all 0.2s;
}
.day.on {
  background: var(--surface);
  border-color: var(--border);
  box-shadow: 0 4px 20px rgba(10,132,255,0.15), inset 0 1px 0 rgba(255,255,255,0.12);
}
.day-l { font-size:19px; font-weight:800; letter-spacing:-0.5px; color:var(--text2); }
.day-n { font-size:9px; font-weight:600; letter-spacing:0.5px; color:var(--text3); margin-top:2px; }
.day.on .day-l { color:#fff; }
.day.on .day-n { color:var(--text2); }

/* SECTION CARD */
.card {
  border-radius: var(--r1);
  margin-bottom: 12px;
  overflow: hidden;
}
.card-header {
  padding: 18px 18px 14px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}
.card-label { font-size:11px; font-weight:700; letter-spacing:1.5px; color:var(--cyan); text-transform:uppercase; }
.card-title-row { display:flex; align-items:center; gap:8px; margin-top:6px; }
.card-title { font-size:22px; font-weight:800; letter-spacing:-1px; flex:1; outline:none; background:none; border:none; color:#fff; font-family:inherit; }
.card-title::placeholder { color:var(--text3); }
.card-sub { font-size:13px; color:var(--text2); margin-top:4px; line-height:1.5; outline:none; background:none; border:none; color:var(--text2); font-family:inherit; width:100%; }
.card-sub::placeholder { color:var(--text3); }
.edit-btn {
  flex-shrink:0;
  padding: 7px 13px;
  border-radius: 999px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  letter-spacing: -0.2px;
}
.edit-btn.on { background:var(--blue2); border-color:rgba(10,132,255,0.4); color:var(--blue); }

/* BIKE SECTION */
.bike-fields { padding: 0 18px 18px; }
.bike-row { display:flex; gap:10px; margin-bottom:10px; }
.bike-input-wrap { flex:1; }
.field-label { font-size:10px; font-weight:700; letter-spacing:1.5px; color:var(--text3); text-transform:uppercase; margin-bottom:6px; }
.inp {
  width:100%;
  padding: 13px 16px;
  border-radius: var(--r3);
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border2);
  color: #fff;
  font-size: 15px;
  font-family: inherit;
  outline:none;
  transition: all 0.2s;
  -webkit-appearance: none;
}
.inp::placeholder { color:var(--text3); }
.inp:focus { border-color: rgba(10,132,255,0.6); box-shadow: 0 0 0 3px rgba(10,132,255,0.12); }
.inp-sm { padding:11px 14px; font-size:14px; }

/* EXERCISE */
.ex-list { padding: 0 12px 12px; display:flex; flex-direction:column; gap:8px; }
.ex-card {
  border-radius: var(--r2);
  background: var(--surface2);
  border: 1px solid var(--border2);
  overflow: hidden;
  transition: all 0.2s;
}
.ex-card.open { background:var(--surface); border-color:var(--border); }
.ex-top {
  padding: 14px 14px 12px;
  display:flex;
  align-items:flex-start;
  gap:10px;
  cursor: pointer;
}
.ex-num {
  width:26px; height:26px; border-radius:8px; flex-shrink:0;
  background: var(--blue2);
  border: 1px solid rgba(10,132,255,0.3);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:var(--blue);
}
.ex-info { flex:1; min-width:0; }
.ex-name-input {
  font-size:16px; font-weight:700; letter-spacing:-0.3px;
  background:none; border:none; color:#fff; font-family:inherit;
  width:100%; outline:none;
}
.ex-name-input::placeholder { color:var(--text3); }
.ex-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.tag {
  padding: 5px 11px;
  border-radius: 999px;
  font-size:11px; font-weight:600;
}
.tag-s { background:var(--blue2); border:1px solid rgba(10,132,255,0.3); color:var(--cyan); }
.tag-r { background:var(--surface2); border:1px solid var(--border2); color:var(--text2); }
.tag-w { background:var(--green2); border:1px solid rgba(48,209,88,0.3); color:var(--green); }
.ex-chevron { color:var(--text3); font-size:12px; flex-shrink:0; margin-top:2px; transition:transform 0.2s; }
.ex-card.open .ex-chevron { transform:rotate(180deg); }

.ex-body { padding:0 14px 14px; }
.ex-fields { display:flex; gap:8px; margin-bottom:10px; }
.ex-field { flex:1; }
.ex-note-inp {
  width:100%; padding:11px 14px; border-radius:var(--r3);
  background:rgba(255,255,255,0.04); border:1px solid var(--border2);
  color:var(--text2); font-size:13px; font-family:inherit; outline:none;
  resize:none; min-height:60px; transition:all 0.2s;
  -webkit-appearance:none;
}
.ex-note-inp::placeholder { color:var(--text3); }
.ex-note-inp:focus { border-color:rgba(10,132,255,0.5); }

/* Extra rows */
.extra-rows { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
.extra-row { display:flex; align-items:center; gap:8px; }
.extra-row .inp { flex:1; }
.del-row-btn {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  background:var(--red2); border:1px solid rgba(255,69,58,0.3);
  color:var(--red); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:inherit;
}
.add-row-btn {
  margin-top:8px;
  width:100%; padding:10px;
  border-radius:var(--r3);
  background:rgba(255,255,255,0.04);
  border:1px dashed var(--border2);
  color:var(--text3); font-size:12px; font-weight:600;
  letter-spacing:0.5px; cursor:pointer; font-family:inherit;
  transition:all 0.2s;
}
.add-row-btn:active { background:var(--surface); }

/* Delete exercise */
.del-ex-btn {
  width:100%; margin-top:10px; padding:10px;
  border-radius:var(--r3);
  background:var(--red2); border:1px solid rgba(255,69,58,0.25);
  color:var(--red); font-size:12px; font-weight:600;
  letter-spacing:0.5px; cursor:pointer; font-family:inherit;
}

/* Add exercise */
.add-ex-btn {
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin:0 12px 12px;
  padding:14px;
  border-radius:var(--r2);
  background:var(--surface2);
  border:1px dashed var(--border2);
  color:var(--text2); font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:all 0.2s;
  letter-spacing:-0.2px;
}
.add-ex-btn:active { background:var(--surface); }

/* REST */
.rest-card { padding:36px 20px; text-align:center; }
.rest-icon { font-size:44px; margin-bottom:12px; }
.rest-title { font-size:22px; font-weight:800; letter-spacing:-1px; }
.rest-sub { margin-top:6px; color:var(--text2); font-size:14px; line-height:1.6; }

/* DOCK */
.dock {
  position:fixed;
  left:50%; transform:translateX(-50%);
  bottom:calc(env(safe-area-inset-bottom) + 12px);
  width:calc(100% - 32px); max-width:400px;
  padding:12px 8px;
  border-radius:26px;
  background:rgba(10,10,10,0.8);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(60px) saturate(200%);
  -webkit-backdrop-filter:blur(60px) saturate(200%);
  display:flex; justify-content:space-around; align-items:center;
  box-shadow:0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
  z-index:200;
}
.dock-item { display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--text3); font-size:10px; font-weight:500; cursor:pointer; padding:4px 12px; transition:all 0.2s; }
.dock-item.on { color:#fff; }
.dock-icon { font-size:22px; line-height:1; }

/* DIVIDER */
.divider { height:1px; background:var(--border2); margin:0 18px; }

/* TOAST */
#toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:rgba(30,30,30,0.95); border:1px solid var(--border);
  border-radius:999px; padding:10px 20px;
  font-size:13px; font-weight:600; color:#fff;
  backdrop-filter:blur(20px);
  z-index:999; opacity:0; transition:opacity 0.25s;
  pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; }

/* ANIMATIONS */
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation:fadeUp 0.2s ease forwards; }
</style>
</head>

<div id="toast"></div>

<!-- HEADER -->
<div class="header z1">

    <div class="header-left">
      <h1>HB Shred</h1>

</div>

<div class="content z1">

<div class="dock">

  <div class="dock-item"><div class="dock-icon">⚙️</div><div>Settings</div></div>
</div>

];

// ── STATE ───────────────────────────────────────────────────────────
var P, wi, di, editMode, openEx;

function loadState() {
  try {
    var s = JSON.parse(localStorage.getItem("hbshred_v4") || "null");
    if (s && s.P && s.P.weeks && s.P.weeks.length === 5) {
      P = s.P; wi = s.wi||0; di = s.di||0;
      editMode = false; openEx = s.openEx||{};
    } else { reset(); }
  } catch(e) { reset(); }
}

function reset() {
  P = JSON.parse(JSON.stringify(DEFAULT));
  wi=0; di=0; editMode=false; openEx={};
}

function save() {
  try { localStorage.setItem("hbshred_v4", JSON.stringify({P:P,wi:wi,di:di,openEx:openEx})); } catch(e){}
  var el = document.getElementById("saveLabel");
  if(el) el.textContent = "Saved";
}

function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 1800);
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── RENDER ──────────────────────────────────────────────────────────
function render() {
  var wk  = P.weeks[wi];
  var day = wk.days[di];
  var pal = WEEK_ORBS[wi];

  // Week chips
  var ws = document.getElementById("weekScroll");
  var wh = "";
  for(var i=0;i<P.weeks.length;i++) {
    wh += '<div class="wchip'+(i===wi?" on":"")+'" onclick="gotoWeek('+i+')">W'+(i+1)+' · '+esc(P.weeks[i].title)+'</div>';
  }
  ws.innerHTML = wh;

  // Hero
  document.getElementById("heroTag").textContent = "Week "+(wi+1);
  document.getElementById("heroTitle").textContent = wk.title;
  document.getElementById("heroSub").textContent = wk.sub;
  var orb = document.getElementById("heroOrb");
  orb.style.background = pal.orb;
  orb.style.boxShadow = "0 0 30px "+pal.shadow;
  var heroCard = document.getElementById("heroCard");
  heroCard.style.setProperty("--hero-glow", pal.glow);
  heroCard.style.setProperty("--hero-orb", pal.orb);
  heroCard.style.setProperty("--hero-shadow", pal.shadow);

  // Progress
  var total=0, filled=0;
  for(var d=0;d<wk.days.length;d++) {
    var exs = wk.days[d].exercises;
    for(var e=0;e<exs.length;e++) { total++; if(exs[e].weight) filled++; }
  }
  var pct = total ? Math.round(filled/total*100) : 0;
  document.getElementById("progFill").style.width = pct+"%";
  document.getElementById("progPct").textContent = pct+"%";

  // Day tabs
  var dt = document.getElementById("dayTabs");
  var dh = "";
  for(var j=0;j<wk.days.length;j++) {
    dh += '<div class="day'+(j===di?" on":"")+'" onclick="gotoDay('+j+')">'
        + '<div class="day-l">'+DAY_L[j]+'</div>'
        + '<div class="day-n">'+DAY_N[j]+'</div>'
        + '</div>';
  }
  dt.innerHTML = dh;

  // Day content
  var dc = document.getElementById("dayContent");
  dc.innerHTML = buildDay(day);
  dc.classList.remove("fade-up");
  void dc.offsetWidth;
  dc.classList.add("fade-up");
}

function buildDay(day) {
  var html = "";

  // ── RIDE CARD ──
  html += '<div class="glass card">';
  html += '<div class="card-header">';
  html += '<div style="flex:1">';
  html += '<div class="card-label">&#128690; ';
  if(editMode) {
    html += '<input class="card-title" style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--cyan);text-transform:uppercase;width:auto;padding:0" '
          + 'value="'+esc(day.rideLabel)+'" oninput="setField(\'rideLabel\',this.value)" placeholder="Label">';
  } else {
    html += esc(day.rideLabel);
  }
  html += '</div>';
  html += '<div class="card-title-row">';
  if(editMode) {
    html += '<input class="card-title" value="'+esc(day.rideDesc)+'" oninput="setField(\'rideDesc\',this.value)" placeholder="Ride description">';
  } else {
    html += '<div class="card-title" style="font-size:22px">'+esc(day.rideDesc)+'</div>';
  }
  html += '</div></div>';
  html += '<button class="edit-btn'+(editMode?" on":"")+'" onclick="toggleEdit()">'+( editMode?"Done":"Edit")+'</button>';
  html += '</div>';

  html += '<div class="bike-fields">';
  html += '<div class="bike-row">';
  html += '<div class="bike-input-wrap"><div class="field-label">Miles Rode</div>';
  html += '<input class="inp inp-sm" type="number" inputmode="decimal" placeholder="0.0" value="'+esc(day.miles)+'" oninput="setField(\'miles\',this.value)">';
  html += '</div>';
  html += '<div class="bike-input-wrap"><div class="field-label">Time</div>';
  html += '<input class="inp inp-sm" placeholder="e.g. 42:18" value="'+esc(day.rideNote)+'" oninput="setField(\'rideNote\',this.value)">';
  html += '</div></div>';
  html += '</div></div>';

  // ── LIFT CARD or REST ──
  if(!day.liftTitle) {
    html += '<div class="glass card"><div class="rest-card">'
          + '<div class="rest-icon">&#128164;</div>'
          + '<div class="rest-title">Rest Day</div>'
          + '<div class="rest-sub">Tuesday is your hardest bike day.<br>Let it rip. No lifting today.</div>'
          + '</div></div>';
    return html;
  }

  html += '<div class="glass card">';
  html += '<div class="card-header">';
  html += '<div style="flex:1">';
  html += '<div class="card-label">&#127947; Strength Session</div>';
  html += '<div class="card-title-row">';
  if(editMode) {
    html += '<input class="card-title" value="'+esc(day.liftTitle)+'" oninput="setField(\'liftTitle\',this.value)" placeholder="Session name">';
  } else {
    html += '<div class="card-title" style="font-size:22px">'+esc(day.liftTitle)+'</div>';
  }
  html += '</div>';
  if(editMode) {
    html += '<input class="card-sub" value="'+esc(day.liftSub)+'" oninput="setField(\'liftSub\',this.value)" placeholder="Focus / subtitle">';
  } else {
    html += '<div class="card-sub">'+esc(day.liftSub)+'</div>';
  }
  html += '</div></div>';

  html += '<div class="ex-list">';

  var exs = day.exercises;
  for(var i=0;i<exs.length;i++) {
    var ex = exs[i];
    var xkey = wi+"_"+di+"_"+i;
    var open = !!openEx[xkey];
    html += '<div class="ex-card'+(open?" open":"")+'" id="exc'+i+'">';
    html += '<div class="ex-top" onclick="toggleEx(\''+xkey+'\')">';
    html += '<div class="ex-num">'+(i+1)+'</div>';
    html += '<div class="ex-info">';
    if(editMode) {
      html += '<input class="ex-name-input" value="'+esc(ex.name)+'" oninput="setEx('+i+',\'name\',this.value)" onclick="event.stopPropagation()" placeholder="Exercise name">';
    } else {
      html += '<div class="ex-name-input" style="cursor:pointer">'+esc(ex.name)+'</div>';
    }
    html += '<div class="ex-tags">';
    if(editMode) {
      html += '<input class="inp inp-sm" style="width:70px;padding:5px 10px;font-size:11px" value="'+esc(ex.sets)+'" oninput="setEx('+i+',\'sets\',this.value)" onclick="event.stopPropagation()" placeholder="Sets">';
      html += '<input class="inp inp-sm" style="width:90px;padding:5px 10px;font-size:11px" value="'+esc(ex.reps)+'" oninput="setEx('+i+',\'reps\',this.value)" onclick="event.stopPropagation()" placeholder="Reps">';
    } else {
      html += '<span class="tag tag-s">'+esc(ex.sets)+' Sets</span>';
      html += '<span class="tag tag-r">'+esc(ex.reps)+'</span>';
      if(ex.weight) html += '<span class="tag tag-w">&#9878; '+esc(ex.weight)+'</span>';
    }
    html += '</div></div>';
    html += '<div class="ex-chevron">&#9660;</div>';
    html += '</div>';

    if(open) {
      html += '<div class="ex-body">';
      // weight
      html += '<div class="ex-fields">';
      html += '<div class="ex-field"><div class="field-label">Weight Used</div>';
      html += '<input class="inp inp-sm" placeholder="e.g. 135 lbs" value="'+esc(ex.weight)+'" oninput="setEx('+i+',\'weight\',this.value)">';
      html += '</div></div>';
      // note
      html += '<div class="field-label" style="margin-top:8px">Notes</div>';
      html += '<textarea class="ex-note-inp" oninput="setEx('+i+',\'note\',this.value)" placeholder="Coaching note or how it felt...">'+esc(ex.note)+'</textarea>';

      // extra rows
      if(ex.rows && ex.rows.length > 0) {
        html += '<div class="extra-rows">';
        for(var r=0;r<ex.rows.length;r++) {
          html += '<div class="extra-row">';
          html += '<input class="inp inp-sm" placeholder="Additional note / set / result..." value="'+esc(ex.rows[r])+'" oninput="setRow('+i+','+r+',this.value)">';
          html += '<button class="del-row-btn" onclick="delRow('+i+','+r+')">&#215;</button>';
          html += '</div>';
        }
        html += '</div>';
      }
      html += '<button class="add-row-btn" onclick="addRow('+i+')">+ Add Row</button>';

      if(editMode) {
        html += '<button class="del-ex-btn" onclick="delEx('+i+')">&#128465; Remove Exercise</button>';
      }
      html += '</div>';
    }

    html += '</div>';
  }

  html += '</div>';

  if(editMode) {
    html += '<button class="add-ex-btn" onclick="addEx()"><span style="font-size:18px">+</span> Add Exercise</button>';
  }

  html += '</div>';
  return html;
}

// ── ACTIONS ─────────────────────────────────────────────────────────
function gotoWeek(i) { wi=i; di=0; editMode=false; save(); render(); }
function gotoDay(i)  { di=i; save(); render(); }
function toggleEdit() { editMode=!editMode; render(); }

function toggleEx(k) {
  openEx[k] = !openEx[k];
  save(); render();
}

function setField(field, val) {
  P.weeks[wi].days[di][field] = val;
  save();
}

function setEx(ei, field, val) {
  P.weeks[wi].days[di].exercises[ei][field] = val;
  save();
}

function addEx() {
  P.weeks[wi].days[di].exercises.push({name:"New Exercise",sets:"3",reps:"10",weight:"",note:"",rows:[]});
  var i = P.weeks[wi].days[di].exercises.length - 1;
  openEx[wi+"_"+di+"_"+i] = true;
  save(); render(); toast("Exercise added");
}

function delEx(ei) {
  P.weeks[wi].days[di].exercises.splice(ei, 1);
  save(); render(); toast("Exercise removed");
}

function addRow(ei) {
  if(!P.weeks[wi].days[di].exercises[ei].rows) P.weeks[wi].days[di].exercises[ei].rows = [];
  P.weeks[wi].days[di].exercises[ei].rows.push("");
  save(); render();
}

function delRow(ei, ri) {
  P.weeks[wi].days[di].exercises[ei].rows.splice(ri, 1);
  save(); render();
}

function setRow(ei, ri, val) {
  P.weeks[wi].days[di].exercises[ei].rows[ri] = val;
  save();
}

// ── INIT ────────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>
