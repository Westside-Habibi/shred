<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="HB Shred" />
<title>HB SHRED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --glass:rgba(255,255,255,.08);
  --glass2:rgba(255,255,255,.04);
  --stroke:rgba(255,255,255,.09);
  --text:#ffffff;
  --sub:#a1a1aa;
  --blue:#0A84FF;
  --cyan:#5AC8FA;
  --purple:#BF5AF2;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
  background:
    radial-gradient(circle at top left,rgba(10,132,255,.18),transparent 30%),
    radial-gradient(circle at top right,rgba(191,90,242,.15),transparent 35%),
    linear-gradient(180deg,#0a0a0f 0%,#111117 100%);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:-20%;
  background:
    radial-gradient(circle at 30% 20%,rgba(10,132,255,.18),transparent 25%),
    radial-gradient(circle at 70% 40%,rgba(191,90,242,.15),transparent 30%),
    radial-gradient(circle at 50% 80%,rgba(90,200,250,.12),transparent 28%);
  filter:blur(60px);
  animation:float 12s ease-in-out infinite alternate;
  z-index:-2;
}
@keyframes float{
  from{transform:translateY(-10px) translateX(-20px) scale(1);}
  to{transform:translateY(20px) translateX(20px) scale(1.1);}
}
.app{max-width:430px;margin:0 auto;padding-bottom:140px;}

/* HEADER */
.header{
  position:sticky;top:0;z-index:50;
  padding:calc(env(safe-area-inset-top)+16px) 20px 18px;
  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);
  background:rgba(10,10,15,.45);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.title{font-size:38px;font-weight:800;letter-spacing:-2px;}
.subtitle{margin-top:5px;color:var(--sub);font-size:14px;letter-spacing:-.2px;}
.sync-pill{
  padding:10px 14px;border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(20px);
  font-size:12px;color:#7dd3fc;font-weight:600;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 4px 20px rgba(0,0,0,.18);
}

/* CONTENT */
.content{padding:20px;}

/* GLASS */
.glass{
  position:relative;
  background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-radius:34px;overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 40px rgba(0,0,0,.35);
}
.glass::before{
  content:"";position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 30%);
  pointer-events:none;
}

/* WEEK SCROLL */
.week-scroll{
  display:flex;gap:10px;overflow-x:auto;
  padding-bottom:6px;margin-bottom:18px;
  scrollbar-width:none;
}
.week-scroll::-webkit-scrollbar{display:none;}
.week-chip{
  flex-shrink:0;padding:10px 18px;border-radius:999px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  font-size:13px;font-weight:600;color:#9ca3af;cursor:pointer;
  white-space:nowrap;transition:.2s;
}
.week-chip.active{
  background:linear-gradient(135deg,var(--blue),var(--purple));
  border-color:transparent;color:#fff;
  box-shadow:0 4px 18px rgba(10,132,255,.35);
}

/* HERO */
.hero{padding:28px;margin-bottom:18px;}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;}
.week-tag{font-size:12px;font-weight:700;color:#7dd3fc;letter-spacing:1px;text-transform:uppercase;}
.hero-title{margin-top:10px;font-size:34px;font-weight:800;line-height:1;letter-spacing:-2px;}
.hero-sub{margin-top:10px;color:#cbd5e1;font-size:15px;line-height:1.5;}
.orb{
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(135deg,rgba(10,132,255,.9),rgba(191,90,242,.9));
  box-shadow:0 0 40px rgba(10,132,255,.5);
  filter:saturate(140%);flex-shrink:0;
}

/* PROGRESS */
.prog-wrap{margin-top:16px;display:flex;align-items:center;gap:12px;}
.prog-track{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .4s;}
.prog-label{font-size:12px;font-weight:600;color:#7dd3fc;min-width:32px;text-align:right;}

/* DAYS */
.days{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none;}
.days::-webkit-scrollbar{display:none;}
.day{
  min-width:82px;padding:14px 10px;border-radius:24px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(20px);text-align:center;color:#9ca3af;
  transition:.25s ease;cursor:pointer;
}
.day.active{
  background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08));
  color:white;transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(10,132,255,.18);
}
.day-letter{font-size:22px;font-weight:800;letter-spacing:-1px;}
.day-full{margin-top:4px;font-size:11px;}

/* SECTION */
.section{padding:24px;margin-bottom:18px;}
.section-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#7dd3fc;font-weight:700;}
.section-title{margin-top:10px;font-size:28px;font-weight:800;letter-spacing:-1.5px;}
.section-sub{margin-top:8px;color:#cbd5e1;line-height:1.6;font-size:15px;}

/* INPUT */
.input{
  width:100%;margin-top:18px;outline:none;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:white;border-radius:22px;padding:18px;font-size:15px;
  font-family:Inter,-apple-system,sans-serif;
  backdrop-filter:blur(20px);transition:.2s;
}
.input::placeholder{color:#71717a;}
.input:focus{border-color:rgba(10,132,255,.7);box-shadow:0 0 0 4px rgba(10,132,255,.15);}

/* EXERCISE */
.exercise{
  margin-top:18px;padding:22px;border-radius:28px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(20px);cursor:pointer;transition:.2s;
}
.exercise:active{transform:scale(.99);}
.exercise-header{display:flex;justify-content:space-between;align-items:flex-start;}
.exercise-name{font-size:20px;font-weight:700;letter-spacing:-.6px;}
.expand-icon{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.08);border:none;
  color:#9ca3af;font-size:16px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;cursor:pointer;transition:.2s;
}
.badges{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
.badge{
  padding:10px 14px;border-radius:999px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);
  font-size:12px;font-weight:600;color:#e5e7eb;
}
.badge-blue{background:rgba(10,132,255,.15);border-color:rgba(10,132,255,.25);color:#7dd3fc;}
.badge-green{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.22);color:#34d399;}
.note{margin-top:16px;color:#cbd5e1;line-height:1.7;font-size:14px;}

/* REST DAY */
.rest-card{padding:36px 24px;text-align:center;}
.rest-emoji{font-size:52px;margin-bottom:12px;}
.rest-title{font-size:24px;font-weight:800;letter-spacing:-1px;}
.rest-sub{margin-top:8px;color:#71717a;font-size:15px;line-height:1.6;}

/* DOCK */
.dock{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(env(safe-area-inset-bottom)+14px);
  width:calc(100% - 40px);max-width:390px;
  padding:14px;border-radius:30px;
  background:rgba(20,20,28,.8);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(40px);
  display:flex;justify-content:space-around;align-items:center;
  box-shadow:0 10px 40px rgba(0,0,0,.4);
}
.dock-item{
  display:flex;flex-direction:column;align-items:center;
  color:#9ca3af;font-size:11px;gap:5px;cursor:pointer;
  padding:4px 10px;transition:.2s;
}
.dock-item.active{color:white;}
.icon{font-size:22px;}
</style>
</head>

var DAY_LETTERS = ["M","T","W","T","F"];
var DAY_ABBR    = ["MON","TUE","WED","THU","FRI"];

// State
var wi = 0, di = 0;
var openEx   = {};
var weights  = {};
var bikeLogs = {};

(function(){
  try {
    var s = JSON.parse(localStorage.getItem("hbshred3") || "{}");
    wi       = s.wi       || 0;
    di       = s.di       || 0;
    openEx   = s.openEx   || {};
    weights  = s.weights  || {};
    bikeLogs = s.bikeLogs || {};
  } catch(e){}
})();

function persist(){
  try {
    localStorage.setItem("hbshred3", JSON.stringify({wi:wi,di:di,openEx:openEx,weights:weights,bikeLogs:bikeLogs}));
  } catch(e){}
  var p = document.getElementById("syncPill");
  if(p) p.textContent = "Saved";
}

function esc(s){
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function render(){
  var wk  = PROGRAM[wi];
  var day = wk.days[di];

  // Week chips
  var ws = document.getElementById("weekScroll");
  var wh = "";
  for(var i=0;i<PROGRAM.length;i++){
    wh += '<div class="week-chip'+(i===wi?" active":"")+'" onclick="setWeek('+i+')">W'+(i+1)+' \u00B7 '+PROGRAM[i].title+'</div>';
  }
  ws.innerHTML = wh;

  // Hero
  document.getElementById("heroTag").textContent   = "Week "+(wi+1);
  document.getElementById("heroTitle").innerHTML   = esc(wk.title);
  document.getElementById("heroSub").innerHTML     = wk.sub;
  document.getElementById("heroOrb").style.background  = wk.orb;
  document.getElementById("heroOrb").style.boxShadow   = "0 0 40px "+wk.glow;

  // Progress
  var total=0, filled=0;
  for(var d=0;d<wk.days.length;d++){
    var ex = wk.days[d].exercises;
    if(!ex) continue;
    for(var e=0;e<ex.length;e++){
      total++;
      if(weights["w"+wi+"d"+d+"e"+e]) filled++;
    }
  }
  var pct = total ? Math.round(filled/total*100) : 0;
  document.getElementById("progBar").style.width  = pct+"%";
  document.getElementById("progLabel").textContent = pct+"%";

  // Day tabs
  var dt = document.getElementById("dayTabs");
  var dh = "";
  for(var j=0;j<wk.days.length;j++){
    dh += '<div class="day'+(j===di?" active":"")+'" onclick="setDay('+j+')">'
        + '<div class="day-letter">'+DAY_LETTERS[j]+'</div>'
        + '<div class="day-full">'+DAY_ABBR[j]+'</div>'
        + '</div>';
  }
  dt.innerHTML = dh;

  // Day content
  document.getElementById("dayContent").innerHTML = buildDay(day);
}

function buildDay(day){
  var bkey = "b"+wi+"_"+di;
  var html = "";

  // Bike card
  html += '<div class="glass section">'
        + '<div class="section-label">&#128690; Morning Ride</div>'
        + '<div class="section-title">'+esc(day.bike)+'</div>'
        + '<div class="section-sub">'+esc(day.bikeDesc)+'</div>'
        + '<input class="input" placeholder="Ride notes or time..." value="'+esc(bikeLogs[bkey]||"")+'" oninput="saveBike(\''+bkey+'\',this.value)">'
        + '</div>';

  // Rest day
  if(!day.lift){
    html += '<div class="glass section">'
          + '<div class="rest-card">'
          + '<div class="rest-emoji">&#128164;</div>'
          + '<div class="rest-title">Rest Day</div>'
          + '<div class="rest-sub">Tuesday is your hardest bike day.<br>Let it rip on the trail. No lifting needed.</div>'
          + '</div></div>';
    return html;
  }

  // Lift card
  html += '<div class="glass section">'
        + '<div class="section-label">&#127947; Strength Session</div>'
        + '<div class="section-title">'+esc(day.lift)+'</div>'
        + '<div class="section-sub">'+esc(day.liftFocus)+'</div>';

  for(var i=0;i<day.exercises.length;i++){
    var ex   = day.exercises[i];
    var ekey = "w"+wi+"d"+di+"e"+i;
    var xkey = wi+"_"+di+"_"+i;
    var open = !!openEx[xkey];
    var wval = weights[ekey]||"";

    html += '<div class="exercise" onclick="toggleEx(\''+xkey+'\')">'
          + '<div class="exercise-header">'
          + '<div class="exercise-name">'+esc(ex.name)+'</div>'
          + '<div class="expand-icon">'+(open?"&#8722;":"&#43;")+'</div>'
          + '</div>'
          + '<div class="badges">'
          + '<span class="badge badge-blue">'+esc(ex.sets)+' Sets</span>'
          + '<span class="badge">'+esc(ex.reps)+'</span>'
          + (wval?'<span class="badge badge-green">&#9878; '+esc(wval)+'</span>':"")
          + '</div>';

    if(open){
      html += (ex.note?'<div class="note">'+esc(ex.note)+'</div>':"")
            + '<input class="input" placeholder="Weight used — e.g. 135 lbs, felt strong" value="'+esc(wval)+'" '
            + 'oninput="saveWeight(\''+ekey+'\',this.value)" onclick="event.stopPropagation()">';
    }

    html += '</div>';
  }

  html += '</div>';
  return html;
}

function setWeek(i){ wi=i; di=0; persist(); render(); }
function setDay(i) { di=i; persist(); render(); }

function toggleEx(k){
  openEx[k] = !openEx[k];
  persist(); render();
}

function saveBike(k,v)  { bikeLogs[k]=v; persist(); }
function saveWeight(k,v){ weights[k]=v;  persist(); render(); }

render();
</script>
