<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="HB Shred"/>
<title>HB Shred</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;background:#000;color:#fff;min-height:100vh;overflow-x:hidden;padding-bottom:calc(env(safe-area-inset-bottom)+82px);-webkit-font-smoothing:antialiased;}
body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 0%,rgba(10,132,255,.18),transparent 50%),radial-gradient(ellipse at 80% 10%,rgba(191,90,242,.13),transparent 45%);pointer-events:none;}
::-webkit-scrollbar{display:none;}
.z{position:relative;z-index:1;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;padding:calc(env(safe-area-inset-top)+14px) 18px 12px;background:rgba(0,0,0,.75);border-bottom:1px solid rgba(255,255,255,.07);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.hdr h1{font-size:26px;font-weight:800;letter-spacing:-.8px;}
.hdr p{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px;}
.saved{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:999px;background:rgba(48,209,88,.1);border:1px solid rgba(48,209,88,.22);font-size:11px;font-weight:600;color:#30d158;}
.sdot{width:6px;height:6px;border-radius:50%;background:#30d158;box-shadow:0 0 5px #30d158;}

/* WRAP */
.wrap{padding:12px 13px 0;position:relative;z-index:1;}

/* WEEK CHIPS */
.wscroll{display:flex;gap:7px;overflow-x:auto;margin-bottom:11px;}
.wchip{flex-shrink:0;padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:12px;font-weight:600;color:rgba(255,255,255,.45);cursor:pointer;white-space:nowrap;transition:.2s;}
.wchip.on{background:#0a84ff;border-color:#0a84ff;color:#fff;box-shadow:0 0 16px rgba(10,132,255,.4);}

/* HERO */
.hero{border-radius:20px;padding:18px;margin-bottom:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;top:-24px;right:-24px;width:120px;height:120px;border-radius:50%;background:var(--hg,rgba(10,132,255,.28));filter:blur(36px);pointer-events:none;}
.htag{font-size:10px;font-weight:700;letter-spacing:2px;color:#5ac8fa;text-transform:uppercase;}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;margin-top:5px;}
.htitle{font-size:22px;font-weight:800;letter-spacing:-.8px;line-height:1.1;}
.hsub{font-size:12px;color:rgba(255,255,255,.45);margin-top:4px;}
.horb{width:46px;height:46px;border-radius:50%;flex-shrink:0;}
.prow{display:flex;align-items:center;gap:9px;margin-top:12px;}
.ptrack{flex:1;height:4px;background:rgba(255,255,255,.09);border-radius:2px;overflow:hidden;}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#0a84ff,#bf5af2);transition:width .4s;}
.ppct{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);min-width:26px;text-align:right;}

/* DAY TABS */
.days{display:flex;gap:6px;margin-bottom:11px;}
.daybtn{flex:1;padding:10px 4px;border-radius:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);text-align:center;cursor:pointer;transition:.2s;}
.daybtn.on{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.18);box-shadow:0 3px 14px rgba(10,132,255,.14);}
.dl{font-size:16px;font-weight:800;color:rgba(255,255,255,.35);}
.dn{font-size:9px;font-weight:600;letter-spacing:.3px;color:rgba(255,255,255,.22);margin-top:2px;}
.daybtn.on .dl{color:#fff;} .daybtn.on .dn{color:rgba(255,255,255,.45);}

/* CARD */
.card{border-radius:18px;margin-bottom:11px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);overflow:hidden;}
.chdr{padding:14px 15px 11px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.clabel{font-size:10px;font-weight:700;letter-spacing:1.4px;color:#5ac8fa;text-transform:uppercase;}
.ctitle{font-size:19px;font-weight:800;letter-spacing:-.7px;margin-top:4px;}
.csub{font-size:12px;color:rgba(255,255,255,.4);margin-top:3px;}

/* EDIT BUTTONS */
.ebtn{flex-shrink:0;padding:6px 13px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.ebtn.on{background:rgba(10,132,255,.18);border-color:rgba(10,132,255,.4);color:#5ac8fa;}

/* INPUTS */
.inp{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:11px;padding:11px 13px;font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none;transition:.2s;}
.inp::placeholder{color:rgba(255,255,255,.18);}
.inp:focus{border-color:rgba(10,132,255,.55);box-shadow:0 0 0 3px rgba(10,132,255,.1);}
.inp-sm{padding:8px 11px;font-size:13px;}

/* BIKE */
.bfields{padding:0 15px 14px;}
.brow{display:flex;gap:8px;margin-bottom:8px;}
.bwrap{flex:1;}
.flabel{font-size:9px;font-weight:700;letter-spacing:1.4px;color:rgba(255,255,255,.28);text-transform:uppercase;margin-bottom:4px;}

/* EXERCISE LIST */
.exlist{padding:0 9px 9px;display:flex;flex-direction:column;gap:6px;}

/* EXERCISE CARD */
.excard{border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);overflow:hidden;}
.excard.open{background:rgba(255,255,255,.065);border-color:rgba(255,255,255,.11);}
.extop{padding:12px 12px 10px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.exnum{width:22px;height:22px;border-radius:7px;flex-shrink:0;background:rgba(10,132,255,.16);border:1px solid rgba(10,132,255,.28);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#5ac8fa;margin-top:1px;}
.exinfo{flex:1;min-width:0;}
.exname{font-size:15px;font-weight:700;letter-spacing:-.2px;}
.exname-inp{width:100%;font-size:15px;font-weight:700;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);color:#fff;border-radius:9px;padding:7px 10px;font-family:inherit;outline:none;-webkit-appearance:none;}
.exname-inp:focus{border-color:rgba(10,132,255,.5);}
.extags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.tag{padding:4px 9px;border-radius:999px;font-size:11px;font-weight:600;}
.ts{background:rgba(10,132,255,.14);border:1px solid rgba(10,132,255,.25);color:#5ac8fa;}
.tr{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);}
.tag-inp{width:55px;padding:4px 8px;border-radius:8px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);color:#fff;font-size:11px;font-family:inherit;outline:none;-webkit-appearance:none;}
.tag-inp.wide{width:100px;}
.tag-inp:focus{border-color:rgba(10,132,255,.45);}
.chev{color:rgba(255,255,255,.18);font-size:10px;flex-shrink:0;margin-top:3px;transition:transform .2s;}
.excard.open .chev{transform:rotate(180deg);}

/* EX BODY */
.exbody{padding:0 12px 12px;}

/* SET ROWS — one per set */
.set-rows{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
.set-row{display:flex;align-items:center;gap:8px;}
.set-badge{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);min-width:36px;flex-shrink:0;letter-spacing:.3px;}
.set-inp{flex:1;padding:8px 11px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);color:#fff;font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none;transition:.2s;}
.set-inp::placeholder{color:rgba(255,255,255,.18);}
.set-inp:focus{border-color:rgba(10,132,255,.5);box-shadow:0 0 0 2px rgba(10,132,255,.1);}
.set-filled{border-color:rgba(48,209,88,.3);background:rgba(48,209,88,.06);}

/* NOTES */
.exnote{width:100%;padding:9px 11px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-size:12px;font-family:inherit;outline:none;resize:none;min-height:50px;-webkit-appearance:none;margin-bottom:8px;}
.exnote::placeholder{color:rgba(255,255,255,.18);}
.exnote:focus{border-color:rgba(10,132,255,.4);}

/* EXTRA ROWS */
.xrows{display:flex;flex-direction:column;gap:5px;margin-bottom:7px;}
.xrow{display:flex;align-items:center;gap:7px;}
.xrow .inp{flex:1;}
.delbtn{width:26px;height:26px;flex-shrink:0;border-radius:50%;background:rgba(255,69,58,.14);border:1px solid rgba(255,69,58,.28);color:#ff453a;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.addrow{width:100%;padding:8px;border-radius:10px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.1);color:rgba(255,255,255,.3);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:7px;}
.delex{width:100%;padding:8px;border-radius:10px;background:rgba(255,69,58,.09);border:1px solid rgba(255,69,58,.2);color:#ff453a;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}

/* ADD EX */
.addex{display:flex;align-items:center;justify-content:center;gap:6px;margin:0 9px 9px;padding:12px;border-radius:13px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.09);color:rgba(255,255,255,.3);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}

/* LIFT EDIT BUTTON — separate from ride */
.lift-edit-row{padding:0 15px 12px;display:flex;justify-content:flex-end;}

/* REST */
.rest{text-align:center;padding:30px 18px;}
.ricon{font-size:38px;margin-bottom:9px;}
.rtitle{font-size:19px;font-weight:800;letter-spacing:-.7px;}
.rsub{margin-top:5px;color:rgba(255,255,255,.35);font-size:13px;line-height:1.6;}

/* BOTTOM NAV */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:200;background:rgba(8,8,8,.88);border-top:1px solid rgba(255,255,255,.08);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);display:flex;padding-bottom:env(safe-area-inset-bottom);}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 7px;cursor:pointer;color:rgba(255,255,255,.28);font-size:10px;font-weight:500;border:none;background:none;font-family:inherit;transition:.2s;}
.nbtn.on{color:#0a84ff;}
.ni{font-size:21px;line-height:1;}

/* VIEWS */
.view{display:none;}
.view.on{display:block;}

/* PROGRESS */
.pcard{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:16px;margin-bottom:11px;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.sbox{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px;}
.sval{font-size:24px;font-weight:800;letter-spacing:-.8px;}
.slbl{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px;}
.wbar-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.wbar-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.4);width:54px;flex-shrink:0;}
.wbar{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.wbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#0a84ff,#bf5af2);}
.wbar-pct{font-size:11px;font-weight:700;color:#5ac8fa;min-width:26px;text-align:right;}

/* LOG */
.lentry{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px;margin-bottom:9px;}
.lhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.lname{font-size:13px;font-weight:700;}
.lwk{font-size:10px;color:rgba(255,255,255,.3);}
.lsets{display:flex;flex-direction:column;gap:4px;}
.lset{font-size:12px;color:rgba(255,255,255,.5);}
.lset span{color:#30d158;font-weight:700;}

/* SETTINGS */
.stitle{font-size:10px;font-weight:700;letter-spacing:1.4px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:7px;padding-left:3px;}
.scard{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;margin-bottom:18px;}
.srow{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;}
.srow:last-child{border-bottom:none;}
.srl{font-size:14px;font-weight:500;}
.srv{font-size:13px;color:rgba(255,255,255,.35);}
.danger{color:#ff453a;}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:rgba(24,24,24,.97);border:1px solid rgba(255,255,255,.11);border-radius:999px;padding:9px 18px;font-size:13px;font-weight:600;color:#fff;z-index:999;opacity:0;transition:opacity .22s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="hdr z">
  <div class="hdr-row">
    <div><h1>HB Shred</h1><p>5-Week Performance Tracker</p></div>
    <div class="saved"><div class="sdot"></div><span id="slabel">Saved</span></div>
  </div>
</div>

<!-- HOME -->
<div class="view on" id="vHome">
  <div class="wrap z">
    <div class="wscroll" id="weekScroll"></div>
    <div class="hero" id="heroCard">
      <div class="htag" id="htag">Week 1</div>
      <div class="hrow">
        <div><div class="htitle" id="htitle">Foundation & Form</div><div class="hsub" id="hsub">Learn the patterns.</div></div>
        <div class="horb" id="horb"></div>
      </div>
      <div class="prow"><div class="ptrack"><div class="pfill" id="pfill" style="width:0%"></div></div><div class="ppct" id="ppct">0%</div></div>
    </div>
    <div class="days" id="dayTabs"></div>
    <div id="dayContent"></div>
  </div>
</div>

<!-- PROGRESS -->
<div class="view" id="vProgress">
  <div class="wrap z">
    <div style="padding:6px 0 14px;font-size:22px;font-weight:800;letter-spacing:-.8px">Progress</div>
    <div class="pgrid" id="statGrid"></div>
    <div class="pcard"><div style="font-size:13px;font-weight:700;margin-bottom:11px">Weekly Completion</div><div id="weekBars"></div></div>
    <div class="pcard"><div style="font-size:13px;font-weight:700;margin-bottom:11px">Miles Log</div><div id="milesLog"></div></div>
  </div>
</div>

<!-- LOG -->
<div class="view" id="vLog">
  <div class="wrap z">
    <div style="padding:6px 0 14px;font-size:22px;font-weight:800;letter-spacing:-.8px">Weight Log</div>
    <div id="logContent"></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="view" id="vSettings">
  <div class="wrap z">
    <div style="padding:6px 0 14px;font-size:22px;font-weight:800;letter-spacing:-.8px">Settings</div>
    <div class="stitle">Program</div>
    <div class="scard">
      <div class="srow" onclick="resetAll()"><div class="srl danger">Reset All Data</div><div class="srv">›</div></div>
      <div class="srow" onclick="exportData()"><div class="srl">Export Backup (JSON)</div><div class="srv">›</div></div>
    </div>
    <div class="stitle">Install</div>
    <div class="scard">
      <div class="srow" style="cursor:default"><div><div class="srl">Add to Home Screen</div><div style="font-size:12px;color:rgba(255,255,255,.3);margin-top:3px">Safari → Share → Add to Home Screen</div></div></div>
    </div>
    <div class="stitle">About</div>
    <div class="scard">
      <div class="srow" style="cursor:default"><div class="srl">HB Shred</div><div class="srv">v3.0</div></div>
      <div class="srow" style="cursor:default"><div class="srl">Storage Used</div><div class="srv" id="storInfo">—</div></div>
    </div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nbtn on" id="nb0" onclick="goNav(0)"><div class="ni">🏠</div><div>Home</div></button>
  <button class="nbtn" id="nb1" onclick="goNav(1)"><div class="ni">📈</div><div>Progress</div></button>
  <button class="nbtn" id="nb2" onclick="goNav(2)"><div class="ni">📋</div><div>Log</div></button>
  <button class="nbtn" id="nb3" onclick="goNav(3)"><div class="ni">⚙️</div><div>Settings</div></button>
</div>

var ORBS=[
  {bg:"linear-gradient(135deg,#0a84ff,#bf5af2)",glow:"rgba(10,132,255,.28)"},
  {bg:"linear-gradient(135deg,#5ac8fa,#0a84ff)",glow:"rgba(90,200,250,.22)"},
  {bg:"linear-gradient(135deg,#ff453a,#ff6b00)",glow:"rgba(255,69,58,.28)"},
  {bg:"linear-gradient(135deg,#30d158,#5ac8fa)",glow:"rgba(48,209,88,.22)"},
  {bg:"linear-gradient(135deg,#bf5af2,#ff453a)",glow:"rgba(191,90,242,.28)"}
];
var DAY_L=["M","T","W","T","F"];
var DAY_N=["MON","TUE","WED","THU","FRI"];

// ── STATE ──────────────────────────────────────────────────────────────
var P,wi,di,liftEdit,openEx;

function loadState(){
  try{
    var s=JSON.parse(localStorage.getItem("hbshred6")||"null");
    if(s&&s.P&&s.P.weeks&&s.P.weeks.length===5){
      P=s.P; wi=s.wi||0; di=s.di||0; openEx=s.openEx||{};
      // ensure setWeights arrays exist and match set count
      P.weeks.forEach(function(wk){
        wk.days.forEach(function(day){
          (day.exercises||[]).forEach(function(ex){
            if(!ex.setWeights) ex.setWeights=[];
            var n=parseInt(ex.sets)||0;
            while(ex.setWeights.length<n) ex.setWeights.push("");
            ex.setWeights=ex.setWeights.slice(0,n);
            if(!ex.rows) ex.rows=[];
          });
        });
      });
    } else { resetState(); }
  }catch(e){ resetState(); }
  liftEdit=false;
}

function resetState(){ P=JSON.parse(JSON.stringify(DEF)); wi=0; di=0; openEx={}; }

function saveAll(){
  try{ localStorage.setItem("hbshred6",JSON.stringify({P:P,wi:wi,di:di,openEx:openEx})); }catch(e){}
  document.getElementById("slabel").textContent="Saved";
}

function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},1800);
}
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── NAV ────────────────────────────────────────────────────────────────
var VIEWS=["vHome","vProgress","vLog","vSettings"];
function goNav(n){
  VIEWS.forEach(function(v,i){
    document.getElementById(v).classList.toggle("on",i===n);
    document.getElementById("nb"+i).classList.toggle("on",i===n);
  });
  if(n===1) renderProgress();
  if(n===2) renderLog();
  if(n===3){ try{var b=new Blob([localStorage.getItem("hbshred6")||""]);document.getElementById("storInfo").textContent=Math.round(b.size/1024)+" KB";}catch(e){} }
}

// ── RENDER ─────────────────────────────────────────────────────────────
function render(){
  var wk=P.weeks[wi]; var day=wk.days[di]; var pal=ORBS[wi];

  // week chips
  var wh="";
  for(var i=0;i<P.weeks.length;i++)
    wh+='<div class="wchip'+(i===wi?" on":"")+'" onclick="gW('+i+')">W'+(i+1)+' · '+esc(P.weeks[i].title)+'</div>';
  document.getElementById("weekScroll").innerHTML=wh;

  // hero
  document.getElementById("htag").textContent="Week "+(wi+1);
  document.getElementById("htitle").textContent=wk.title;
  document.getElementById("hsub").textContent=wk.sub;
  var orb=document.getElementById("horb");
  orb.style.background=pal.bg; orb.style.boxShadow="0 0 22px "+pal.glow.replace(".28",".7");
  document.getElementById("heroCard").style.setProperty("--hg",pal.glow);

  // progress — based on set weights filled
  var tot=0,fil=0;
  for(var d=0;d<wk.days.length;d++){
    (wk.days[d].exercises||[]).forEach(function(ex){
      (ex.setWeights||[]).forEach(function(sw){ tot++; if(sw) fil++; });
    });
  }
  var pct=tot?Math.round(fil/tot*100):0;
  document.getElementById("pfill").style.width=pct+"%";
  document.getElementById("ppct").textContent=pct+"%";

  // day tabs
  var dh="";
  for(var j=0;j<wk.days.length;j++)
    dh+='<div class="daybtn'+(j===di?" on":"")+'" onclick="gD('+j+')">'
       +'<div class="dl">'+DAY_L[j]+'</div><div class="dn">'+DAY_N[j]+'</div></div>';
  document.getElementById("dayTabs").innerHTML=dh;

  document.getElementById("dayContent").innerHTML=buildDay(day);
}

function buildDay(day){
  var h="";

  // ── RIDE CARD ──
  h+='<div class="card">';
  h+='<div class="chdr">';
  h+='<div style="flex:1">';
  h+='<div class="clabel">🚴 '+esc(day.rideLabel)+'</div>';
  h+='<div class="ctitle" style="font-size:18px">'+esc(day.rideDesc)+'</div>';
  h+='</div>';
  h+='<button class="ebtn" onclick="editRide()">Edit</button>';
  h+='</div>';
  h+='<div class="bfields">';
  h+='<div class="brow">';
  h+='<div class="bwrap"><div class="flabel">Miles Rode</div>';
  h+='<input class="inp inp-sm" type="number" inputmode="decimal" placeholder="0.0" value="'+esc(day.miles)+'" oninput="sf(\'miles\',this.value)"></div>';
  h+='<div class="bwrap"><div class="flabel">Time</div>';
  h+='<input class="inp inp-sm" placeholder="42:18" value="'+esc(day.rideNote)+'" oninput="sf(\'rideNote\',this.value)"></div>';
  h+='</div></div></div>';

  // ── REST ──
  if(!day.liftTitle){
    h+='<div class="card"><div class="rest"><div class="ricon">💤</div><div class="rtitle">Rest Day</div><div class="rsub">Tuesday is your hardest bike day.<br>Let it rip. No lifting today.</div></div></div>';
    return h;
  }

  // ── LIFT CARD ──
  h+='<div class="card">';
  h+='<div class="chdr">';
  h+='<div style="flex:1">';
  h+='<div class="clabel">🏋️ Strength Session</div>';
  h+='<div class="ctitle" style="font-size:18px">'+esc(day.liftTitle)+'</div>';
  h+='<div class="csub">'+esc(day.liftSub)+'</div>';
  h+='</div>';
  h+='<button class="ebtn'+(liftEdit?" on":"")+'" onclick="toggleLiftEdit()">'+( liftEdit?"Done":"Edit")+'</button>';
  h+='</div>';

  // ── EXERCISES ──
  h+='<div class="exlist">';
  var exs=day.exercises||[];
  for(var i=0;i<exs.length;i++){
    var ex=exs[i];
    var xk=wi+"_"+di+"_"+i;
    var open=!!openEx[xk];
    var setCount=parseInt(ex.sets)||0;
    if(!ex.setWeights) ex.setWeights=[];
    while(ex.setWeights.length<setCount) ex.setWeights.push("");

    h+='<div class="excard'+(open?" open":"")+'" id="exc'+i+'">';

    // TOP
    h+='<div class="extop" onclick="tEx(\''+xk+'\')">';
    h+='<div class="exnum">'+(i+1)+'</div>';
    h+='<div class="exinfo">';
    if(liftEdit){
      h+='<input class="exname-inp" value="'+esc(ex.name)+'" oninput="se('+i+',\'name\',this.value)" onclick="event.stopPropagation()" placeholder="Exercise name">';
      h+='<div class="extags" style="margin-top:6px">';
      h+='<input class="tag-inp" value="'+esc(ex.sets)+'" oninput="setSets('+i+',this.value)" onclick="event.stopPropagation()" placeholder="Sets">';
      h+='<input class="tag-inp wide" value="'+esc(ex.reps)+'" oninput="se('+i+',\'reps\',this.value)" onclick="event.stopPropagation()" placeholder="Reps">';
      h+='</div>';
    } else {
      h+='<div class="exname">'+esc(ex.name)+'</div>';
      h+='<div class="extags">';
      h+='<span class="tag ts">'+esc(ex.sets)+' Sets</span>';
      h+='<span class="tag tr">'+esc(ex.reps)+'</span>';
      h+='</div>';
    }
    h+='</div>';
    h+='<div class="chev">▾</div>';
    h+='</div>';

    // EXPANDED
    if(open){
      h+='<div class="exbody">';
      // note
      h+='<textarea class="exnote" oninput="se('+i+',\'note\',this.value)" placeholder="Coaching note or how it felt...">'+esc(ex.note)+'</textarea>';
      // per-set weight inputs
      h+='<div class="set-rows">';
      for(var s=0;s<setCount;s++){
        var sw=ex.setWeights[s]||"";
        var filled=sw?"set-filled":"";
        h+='<div class="set-row">';
        h+='<div class="set-badge">SET '+(s+1)+'</div>';
        h+='<input class="set-inp '+filled+'" placeholder="Weight used (e.g. 135 lbs)" value="'+esc(sw)+'" oninput="sSW('+i+','+s+',this.value)">';
        h+='</div>';
      }
      h+='</div>';
      // extra rows
      if(ex.rows&&ex.rows.length){
        h+='<div class="xrows">';
        for(var r=0;r<ex.rows.length;r++){
          h+='<div class="xrow"><input class="inp inp-sm" placeholder="Extra note..." value="'+esc(ex.rows[r])+'" oninput="sRow('+i+','+r+',this.value)"><button class="delbtn" onclick="delRow('+i+','+r+')">×</button></div>';
        }
        h+='</div>';
      }
      h+='<button class="addrow" onclick="addRow('+i+')">+ Add Note Row</button>';
      if(liftEdit) h+='<button class="delex" onclick="delEx('+i+')">🗑 Remove Exercise</button>';
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div>';

  if(liftEdit){
    h+='<button class="addex" onclick="addEx()"><span style="font-size:17px">+</span> Add Exercise</button>';
  }
  h+='</div>';
  return h;
}

// ── ACTIONS ────────────────────────────────────────────────────────────
function gW(i){ wi=i; di=0; liftEdit=false; saveAll(); render(); }
function gD(i){ di=i; saveAll(); render(); }
function tEx(k){ openEx[k]=!openEx[k]; saveAll(); render(); }
function toggleLiftEdit(){ liftEdit=!liftEdit; render(); }

function sf(f,v){ P.weeks[wi].days[di][f]=v; saveAll(); }
function se(ei,f,v){ P.weeks[wi].days[di].exercises[ei][f]=v; saveAll(); }

function sSW(ei,si,v){
  var ex=P.weeks[wi].days[di].exercises[ei];
  if(!ex.setWeights) ex.setWeights=[];
  ex.setWeights[si]=v;
  saveAll();
  // update input class live
  var inputs=document.querySelectorAll("#exc"+ei+" .set-inp");
  if(inputs[si]){
    inputs[si].classList.toggle("set-filled",!!v);
  }
  // update progress bar
  var wk=P.weeks[wi]; var tot=0,fil=0;
  for(var d=0;d<wk.days.length;d++){
    (wk.days[d].exercises||[]).forEach(function(ex2){
      (ex2.setWeights||[]).forEach(function(sw){tot++;if(sw)fil++;});
    });
  }
  var pct=tot?Math.round(fil/tot*100):0;
  document.getElementById("pfill").style.width=pct+"%";
  document.getElementById("ppct").textContent=pct+"%";
}

function setSets(ei,v){
  var ex=P.weeks[wi].days[di].exercises[ei];
  var n=parseInt(v)||0;
  ex.sets=v;
  if(!ex.setWeights) ex.setWeights=[];
  while(ex.setWeights.length<n) ex.setWeights.push("");
  ex.setWeights=ex.setWeights.slice(0,n);
  saveAll(); render();
}

function sRow(ei,ri,v){ P.weeks[wi].days[di].exercises[ei].rows[ri]=v; saveAll(); }
function addRow(ei){ P.weeks[wi].days[di].exercises[ei].rows.push(""); saveAll(); render(); }
function delRow(ei,ri){ P.weeks[wi].days[di].exercises[ei].rows.splice(ri,1); saveAll(); render(); }

function addEx(){
  P.weeks[wi].days[di].exercises.push({name:"New Exercise",sets:3,reps:"10",note:"",setWeights:["","",""],rows:[]});
  var i=P.weeks[wi].days[di].exercises.length-1;
  openEx[wi+"_"+di+"_"+i]=true;
  saveAll(); render(); toast("Exercise added ✓");
}

function delEx(ei){
  if(!confirm("Remove this exercise?")) return;
  P.weeks[wi].days[di].exercises.splice(ei,1);
  saveAll(); render(); toast("Removed");
}

function editRide(){
  var day=P.weeks[wi].days[di];
  var lbl=prompt("Ride label (e.g. Morning Ride):",day.rideLabel);
  if(lbl!==null) day.rideLabel=lbl;
  var desc=prompt("Ride description:",day.rideDesc);
  if(desc!==null) day.rideDesc=desc;
  saveAll(); render();
}

// ── PROGRESS VIEW ──────────────────────────────────────────────────────
function renderProgress(){
  var totalMiles=0,totalSets=0,loggedSets=0,miles=[];
  var bars="";
  P.weeks.forEach(function(wk,wi2){
    var wt=0,wf=0;
    wk.days.forEach(function(day){
      if(day.miles&&parseFloat(day.miles)>0){
        totalMiles+=parseFloat(day.miles);
        miles.push({w:wi2+1,day:day.name,m:day.miles});
      }
      (day.exercises||[]).forEach(function(ex){
        (ex.setWeights||[]).forEach(function(sw){wt++;totalSets++;if(sw){wf++;loggedSets++;}});
      });
    });
    var wp=wt?Math.round(wf/wt*100):0;
    bars+='<div class="wbar-row"><div class="wbar-lbl">Week '+(wi2+1)+'</div><div class="wbar"><div class="wbar-fill" style="width:'+wp+'%"></div></div><div class="wbar-pct">'+wp+'%</div></div>';
  });
  var overall=totalSets?Math.round(loggedSets/totalSets*100):0;
  document.getElementById("statGrid").innerHTML=
    '<div class="sbox"><div class="sval">'+totalMiles.toFixed(1)+'</div><div class="slbl">Total Miles</div></div>'+
    '<div class="sbox"><div class="sval">'+overall+'%</div><div class="slbl">Overall Progress</div></div>'+
    '<div class="sbox"><div class="sval">'+loggedSets+'</div><div class="slbl">Sets Logged</div></div>'+
    '<div class="sbox"><div class="sval">'+(wi+1)+'</div><div class="slbl">Current Week</div></div>';
  document.getElementById("weekBars").innerHTML=bars;
  var ml="";
  miles.forEach(function(m){ ml+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)"><span style="font-size:12px;color:rgba(255,255,255,.45)">W'+m.w+' · '+esc(m.day)+'</span><span style="font-size:13px;font-weight:700;color:#30d158">'+m.m+' mi</span></div>'; });
  document.getElementById("milesLog").innerHTML=ml||'<div style="color:rgba(255,255,255,.28);font-size:13px;text-align:center;padding:14px">No miles logged yet</div>';
}

// ── LOG VIEW ───────────────────────────────────────────────────────────
function renderLog(){
  var entries=[];
  P.weeks.forEach(function(wk,wi2){
    wk.days.forEach(function(day){
      (day.exercises||[]).forEach(function(ex){
        var logged=(ex.setWeights||[]).filter(function(s){return s;});
        if(logged.length) entries.push({name:ex.name,sets:ex.setWeights||[],week:wi2+1,day:day.name,reps:ex.reps});
      });
    });
  });
  if(!entries.length){document.getElementById("logContent").innerHTML='<div style="text-align:center;padding:40px;color:rgba(255,255,255,.28);font-size:14px">No sets logged yet.<br>Tap an exercise to log weights.</div>';return;}
  var h="";
  entries.forEach(function(e){
    h+='<div class="lentry"><div class="lhead"><div class="lname">'+esc(e.name)+'</div><div class="lwk">W'+e.week+' · '+esc(e.day)+'</div></div><div class="lsets">';
    e.sets.forEach(function(sw,si){
      if(sw) h+='<div class="lset">Set '+(si+1)+' · '+esc(e.reps)+' → <span>'+esc(sw)+'</span></div>';
    });
    h+='</div></div>';
  });
  document.getElementById("logContent").innerHTML=h;
}

// ── SETTINGS ───────────────────────────────────────────────────────────
function resetAll(){
  if(confirm("Reset ALL data? Cannot be undone.")){
    localStorage.removeItem("hbshred6");
    resetState(); liftEdit=false; saveAll(); render(); goNav(0); toast("Reset ✓");
  }
}
function exportData(){
  try{
    var blob=new Blob([JSON.stringify({P:P,wi:wi,di:di,date:new Date().toISOString()},null,2)],{type:"application/json"});
    var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="hbshred-backup.json"; a.click();
    toast("Exported ✓");
  }catch(e){toast("Use desktop browser to export");}
}

// ── INIT ───────────────────────────────────────────────────────────────
loadState();
render();
</script>
